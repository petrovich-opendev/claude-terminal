name: Build & Release macOS DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: python3 scripts/gen_icon.py

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build Electron (TypeScript)
        run: npm run build:electron

      - name: Fix distutils for node-gyp (Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Package DMG (universal)
        run: npx electron-builder --mac dmg --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          name: Claude Terminal ${{ github.ref_name }}
          body: |
            ## Claude Terminal ${{ github.ref_name }}

            **AI-native macOS terminal for Claude Code CLI**
            © 2026 AGENTDATA.PRO / Ruslan Karimov

            ### Install
            1. Download `Claude-Terminal-*-universal.dmg`
            2. Open DMG → drag **Claude Terminal** to Applications
            3. First launch — macOS will block unsigned app. Run once in Terminal:
            ```
            xattr -cr /Applications/Claude\ Terminal.app
            ```
            4. Launch Claude Terminal normally

            ### Requirements
            - macOS 13.0 Ventura or later
            - Claude Code CLI: `npm install -g @anthropic-ai/claude-code`

            > **Note:** This build is unsigned (no Apple Developer certificate).
            > The `xattr -cr` command removes the quarantine flag — safe to run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
