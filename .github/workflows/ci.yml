name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx eslint src --ext .ts,.tsx --max-warnings 0

  security-audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm audit --audit-level=moderate || true

  build:
    runs-on: macos-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Generate app icon
        run: python3 scripts/gen_icon.py
      - name: Build renderer
        run: npm run build:renderer
      - name: Build Electron
        run: npm run build:electron
      - name: Fix distutils for node-gyp
        run: pip3 install setuptools --break-system-packages
      - name: Package DMG
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Verify DMG output
        run: ls -la release/*.dmg
